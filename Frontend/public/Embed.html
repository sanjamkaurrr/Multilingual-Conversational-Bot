<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chatbot Widget</title>
    <style>
      body {
        height: 200vh; /* simulate a long page */
        font-family: Arial, sans-serif;
      }

      /* Floating chat button */
      #chat-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #4f46e5;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 24px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
        z-index: 9999;
      }

      /* Chat iframe container */
      #chat-container {
        position: fixed;
        bottom: 90px;
        right: 20px;
        width: 360px;
        height: 520px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        display: none;
        z-index: 9999;
      }

      #chat-header {
        height: 42px;
        background: #4f46e5;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px;
        font-size: 14px;
      }

      #chat-header button {
        background: transparent;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      iframe {
        width: 100%;
        height: calc(100% - 42px);
        border: none;
      }
    </style>
  </head>
  <body>
    <h1>My Website</h1>
    <p>Scroll, click, interact with page. Chatbot floats at bottom right.</p>

    <!-- Chat widget -->
    <button id="chat-btn">💬</button>

    <div id="chat-container">
      <div id="chat-header">
        <span>Ask UP Policies </span>
        <button id="close-chat">✖</button>
      </div>
      <iframe src="http://localhost:3000"></iframe>
    </div>

    <script>
      const btn = document.getElementById("chat-btn");
      const container = document.getElementById("chat-container");
      const closeBtn = document.getElementById("close-chat");

      btn.onclick = () => {
        container.style.display = "block";
        btn.style.display = "none";
      };

      closeBtn.onclick = () => {
        container.style.display = "none";
        btn.style.display = "block";
      };
    </script>
  </body>
</html>
